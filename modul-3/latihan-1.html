<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1 - Styling Komponen UI</title>
    <link rel="stylesheet" href="latihan-1.css">
</head>

<body>

    <div class="container">
        <h1>Latihan 1: Styling Komponen UI</h1>

        <!-- Komponen Tombol -->
        <h2>1. Tombol (Button)</h2>
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-outline">Outline</button>

        <!-- Komponen Badge -->
        <h2>2. Badge</h2>
        <span class="badge badge-primary">Primary</span>
        <span class="badge badge-success">Success</span>
        <span class="badge badge-danger">Danger</span>

        <!-- Komponen Alert Box -->
        <h2>3. Alert Box</h2>
        <div class="alert alert-success">✅ Data berhasil disimpan!</div>
        <div class="alert alert-warning">⚠️ Perhatian! Periksa kembali input Anda.</div>
        <div class="alert alert-error">❌ Terjadi kesalahan pada sistem.</div>
    </div>

</body>

</html>
