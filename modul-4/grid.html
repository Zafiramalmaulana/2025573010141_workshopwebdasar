<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS grid</title>
    <link rel="stylesheet" href="grid.css">

</head>

<body>

    <h1>Demo CSS grid </h1>
    <section class="grid-dasar">
        <div>item 1</div>
        <div>item 2</div>
        <div>item 3</div>
        <div>item 4</div>
        <div>item 5</div>
        <div>item 6</div>
    </section>

    <section class="layout - halaman">
        <header class="l-header">
            <nav class="l-sidebar">
                Sidebar </nav>
            <main class="l-konten">
                konten utama </main>
            <aside class="aside">
                aside</aside>
            footer</footer>
    </section>



    <section class="grid-auto">
        <div>A </div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
        <div>F</div>
        <div>G</div>
        <div>H</div>
    </section>

    <section class="galeri">
        <div class="g-besar">

            foto utama
        </div>


        <div>foto 2</div>
        <div>foto 3</div>
        <div>foto 4</div>
        <div class="g-lebar">
            banner panjang
        </div>
        <div>foto 6</div>
    </section>

</body>

</html>
